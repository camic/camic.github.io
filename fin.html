<html lang="fr">

	<title>La fin du monde</title>

	<link rel="stylesheet" href="./css/styles.css">

<body>
	<div class="reveal">
		<div class="slides">

		<section data-background-image="img/free-aliens.jpg"  data-transition="slide">
		<span class="square" style="left: 4px; top: 10px;">Pour ou contre les Aliens?</br>Deux clans s'affrontent.</span>
		</section>

		<section data-background-image="img/no-humans.png"  data-transition="zoom-in fade-out">
		<span class="square" style="right: 4px; top: 40px;">Les rivalités s'accentuent.</span>
		</section>

		<section data-background-image="img/training-war.jpg"  data-transition="concave">
		<span class="square" style="right: 40px; top: 20px;">Les oppositions se préparent au pire.</span>
		</section>

		<section data-background-image="img/serious-crisis.jpg"  data-transition="zoom-in fade-out">
		<span class="square" style="left: 4px; top: 10px;">Les violences éclatent.</span>
		</section>

		<section data-background-image="img/sintel22.jpg"  data-transition="slide">
		<span class="square" style="right: 4px; top: 40px;">La terreur s'installe.</span>
		<span class="fragment">
		<span class="bubble-right" style="left: 100px; top: 120px;">Pourquoi ?</span>
		</span>
		</section>

		<section data-background-image="img/missile.jpg"  data-transition="convex">
		<span class="square" style="right: 4px; top: 40px;">Les conflits s'accentuent.</span>
		</section>

		<section data-background-image="img/fire.jpg"  data-transition="concave">
		</section>

		<section data-background-image="img/war.jpg"  data-transition="convex">
		<span class="square" style="right: 40px; top: 20px;">La désolation est partout.</span>
		</section>

		<section data-background-image="img/sintel33.jpg"  data-transition="zoom-in fade-out">
		<span class="bubble-right" style="left: 100px; top: 120px;">Est-ce la fin du monde?</span>
		</section>

		<section data-background-video="snd/warzone.mp4"  data-transition="concave">
		</section>

		<section data-background-image="img/explosion-bombing.jpg"  data-transition="concave">
		</br>
		<h1 style="color: white">Fin</h1>
		<p>&nbsp;</p>
		</section>



		</div>
	</div>
